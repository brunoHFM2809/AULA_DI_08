<!DOCTYPE html>
<html lang="p-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mais.css">
    <title>Mais Você</title>
</head>

<body>

    <div class="caixa">
        <img src="MAIS_VOCE_2009_2.webp" alt="Logo + vc" class="logo">

        <img src="maisvoce.jpg" alt="Foto do Programa" class="foto-topo">

        <h1>Café da Manhã no Mais Você</h1>

        <p class="texto">
            Faça um cadastro e venha tomar café da manhã com Ana Maria ao vivo
        </p>

        <div class="historia">
            <h2>Sobre o Programa</h2>
            <p>O Mais Você é um programa de variedade da tv brasileira.
                Marcado por culinaria, entrevistas e conversa leve com o público.
            </p>
        </div>
        <div class="bloco">
            <div class="lado-form">
                <form id="formulario">
                    <input type="text" name="nome" id="nome" placeholder="Nome">
                    <input type="text" name="telefone" id="telefone" placeholder="Telefone">
                    <input type="password" name="senha" id="senha" placeholder="Senha">
                    <input type="password" name="confirmar" id="confirmar_senha" placeholder="Confirmar a senha">

                    <button type="submit">Cadastrar</button>

                    <p id="mensagem"></p>
                </form>
            </div>
            <div class="lado-foto">
                <img src="maisvoce_dois.jpg" alt="Foto" class="foto-lado">
            </div>
        </div>
    </div>

<script src="presunto.js"></script>

</body>

</html>
